<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShop - Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50">
  <div id="toast-container" class="toast-container"></div>

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <button onclick="goBackToCart()" class="p-2 rounded-xl hover:bg-slate-100 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i>
      </button>
      <h1 class="font-bold text-slate-800 text-lg">Checkout</h1>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Order Summary -->
      <div class="order-2 lg:order-1">
        <div class="bg-white rounded-2xl border border-slate-200 p-6 sticky top-20">
          <h2 class="text-lg font-bold text-slate-800 mb-4">Order Summary</h2>

          <div id="checkout-items" class="space-y-3 mb-6">
            <!-- Cart items rendered here -->
          </div>

          <div class="border-t border-slate-200 pt-4">
            <div class="flex items-center justify-between text-lg font-bold text-slate-800">
              <span>Total</span>
              <span id="checkout-total">$0.00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Customer Details Form -->
      <div class="order-1 lg:order-2">
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
          <h2 class="text-lg font-bold text-slate-800 mb-6">Customer Details</h2>

          <form id="checkout-form" onsubmit="handleCheckout(event)">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
                <input type="text" id="customer-name" required placeholder="Enter your full name"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
                <input type="tel" id="customer-phone" required placeholder="+1 234 567 8900"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email <span class="text-slate-400 font-normal">(optional)</span></label>
                <input type="email" id="customer-email" placeholder="your@email.com"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Delivery Address</label>
                <textarea id="customer-address" required placeholder="Enter your full delivery address" rows="3"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-none"></textarea>
              </div>

              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Additional Notes <span class="text-slate-400 font-normal">(optional)</span></label>
                <textarea id="order-notes" placeholder="Any special instructions..." rows="2"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-none"></textarea>
              </div>
            </div>

            <button type="submit" id="checkout-btn"
              class="w-full mt-6 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
              <i data-lucide="credit-card" class="w-4 h-4"></i>
              <span>Place Order</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Order Success Modal -->
  <div id="order-success-modal" class="modal-overlay hidden">
    <div class="modal-content p-6 max-w-md">
      <div class="text-center">
        <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i data-lucide="check-circle" class="w-8 h-8 text-green-600"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Order Placed Successfully!</h2>
        <p class="text-sm text-slate-500 mb-6">Your order has been received and the seller will contact you soon.</p>

        <div class="bg-slate-50 rounded-xl p-4 mb-6">
          <div class="text-sm text-slate-600 mb-1">Order ID</div>
          <div class="font-mono font-bold text-slate-800" id="success-order-id">#ORDER123</div>
        </div>

        <button onclick="goBackToStore()"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition-all">
          Continue Shopping
        </button>
      </div>
    </div>
  </div>

  <!-- App Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/orders.js"></script>

  <script>
    let cartItems = [];
    let storeSlug = '';

    function initCheckout() {
      // Check if cart is empty
      cartItems = getCart();
      storeSlug = getCartStore();

      if (cartItems.length === 0) {
        showToast('Your cart is empty', 'error');
        window.location.href = 'cart.html';
        return;
      }

      renderCheckoutItems();
      updateCheckoutTotal();
      lucide.createIcons();
    }

    function renderCheckoutItems() {
      const container = document.getElementById('checkout-items');

      container.innerHTML = cartItems.map(item => {
        const firstImage = item.media_urls && item.media_urls.length > 0 ? item.media_urls[0] : null;
        const imageEl = firstImage
          ? `<img src="${firstImage}" alt="${item.name}" class="w-12 h-12 object-cover rounded-lg">`
          : `<div class="w-12 h-12 bg-slate-100 rounded-lg flex items-center justify-center"><i data-lucide="image" class="w-4 h-4 text-slate-300"></i></div>`;

        return `
          <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
            ${imageEl}
            <div class="flex-1 min-w-0">
              <h3 class="font-medium text-slate-800 text-sm truncate">${item.name}</h3>
              <p class="text-xs text-slate-500">Qty: ${item.quantity}</p>
            </div>
            <div class="text-right">
              <div class="font-semibold text-slate-800 text-sm">${formatCurrency(item.price * item.quantity)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateCheckoutTotal() {
      const total = getCartTotal();
      document.getElementById('checkout-total').textContent = formatCurrency(total);
    }

    async function handleCheckout(e) {
      e.preventDefault();

      const btn = document.getElementById('checkout-btn');
      const originalText = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Placing order...</span>';

      const orderData = {
        user_id: cartItems[0]?.user_id, // Get user_id from first cart item
        customer_name: customerData.name,
        phone: customerData.phone,
        email: customerData.email,
        delivery_type: 'delivery', // Default to delivery
        address: customerData.address,
        notes: customerData.notes
      };

      const result = await createOrder(orderData, cartItems);

      if (result.success) {
        // Clear cart
        clearCart();

        // Show success modal
        document.getElementById('success-order-id').textContent = result.orderId;
        document.getElementById('order-success-modal').classList.remove('hidden');
      } else {
        showToast(result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = originalText;
      }

      lucide.createIcons();
    }

    function goBackToCart() {
      window.location.href = 'cart.html';
    }

    function goBackToStore() {
      // Try to go back to the store that was being viewed
      if (storeSlug) {
        window.location.href = `store.html?shop=${storeSlug}`;
      } else {
        window.location.href = 'index.html';
      }
    }

    // Initialize
    initCheckout();
  </script>
</body>
</html></content>
