<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShop - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50">
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Content -->
  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Left Panel - Branding -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-brand-600 via-brand-700 to-brand-900 relative overflow-hidden">
      <div class="absolute inset-0 opacity-10">
        <div class="absolute top-20 left-20 w-72 h-72 bg-white rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-brand-400 rounded-full blur-3xl"></div>
      </div>
      <div class="relative z-10 flex flex-col justify-center px-12 xl:px-20">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-12 h-12 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center">
            <i data-lucide="shopping-bag" class="w-7 h-7 text-white"></i>
          </div>
          <span class="text-3xl font-bold text-white">LinkShop</span>
        </div>
        <h1 class="text-4xl xl:text-5xl font-bold text-white leading-tight mb-6">
          Create your online store in minutes
        </h1>
        <p class="text-lg text-brand-200 leading-relaxed max-w-lg">
          Upload products, share your store link, and start receiving orders. No coding required.
        </p>
        <div class="mt-12 flex gap-8">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-lg flex items-center justify-center">
              <i data-lucide="plus-circle" class="w-5 h-5 text-brand-200"></i>
            </div>
            <span class="text-brand-200">Add Products</span>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-lg flex items-center justify-center">
              <i data-lucide="share-2" class="w-5 h-5 text-brand-200"></i>
            </div>
            <span class="text-brand-200">Share Link</span>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-lg flex items-center justify-center">
              <i data-lucide="package" class="w-5 h-5 text-brand-200"></i>
            </div>
            <span class="text-brand-200">Get Orders</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel - Auth Form -->
    <div class="flex-1 flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
      <div class="w-full max-w-md">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex items-center justify-center gap-2 mb-8">
          <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center">
            <i data-lucide="shopping-bag" class="w-6 h-6 text-white"></i>
          </div>
          <span class="text-2xl font-bold text-slate-800">LinkShop</span>
        </div>

        <!-- Auth Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
          <!-- Tab Switcher -->
          <div class="flex bg-slate-100 rounded-xl p-1 mb-8">
            <button id="tab-login" onclick="switchTab('login')"
              class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all bg-white text-brand-600 shadow-sm">
              Login
            </button>
            <button id="tab-signup" onclick="switchTab('signup')"
              class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-slate-500">
              Sign Up
            </button>
          </div>

          <!-- Login Form -->
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <div class="relative">
                  <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                  <input type="email" id="login-email" required placeholder="you@example.com"
                    class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <div class="relative">
                  <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                  <input type="password" id="login-password" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢"
                    class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                </div>
              </div>
              <button type="submit" id="login-btn"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>Login</span>
              </button>
            </div>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <div class="relative">
                  <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                  <input type="email" id="signup-email" required placeholder="you@example.com"
                    class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <div class="relative">
                  <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                  <input type="password" id="signup-password" required placeholder="Min 6 characters"
                    class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                </div>
              </div>
              <button type="submit" id="signup-btn"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>Create Account</span>
              </button>
            </div>
          </form>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
          Store link? <a href="#" onclick="promptStoreLink()" class="text-brand-500 hover:underline">Enter store URL</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Store Setup Modal (shown after signup) -->
  <div id="store-setup-modal" class="modal-overlay hidden">
    <div class="modal-content p-6">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <i data-lucide="store" class="w-7 h-7 text-brand-600"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800">Set Up Your Store</h2>
        <p class="text-sm text-slate-500 mt-1">Tell us about your store to get started</p>
      </div>
      <form id="store-setup-form" onsubmit="handleStoreSetup(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Store Name</label>
            <input type="text" id="store-name" required placeholder="e.g., Sarah's Crafts"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
              oninput="updateSlugPreview()">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Store URL</label>
            <div class="flex items-center border border-slate-200 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-brand-500 focus-within:border-transparent">
              <span class="px-3 py-2.5 bg-slate-50 text-slate-400 text-sm border-r">link.shop/</span>
              <input type="text" id="store-slug" required placeholder="my-store"
                class="flex-1 px-3 py-2.5 text-sm focus:outline-none"
                pattern="[a-z0-9-]+"
                title="Only lowercase letters, numbers, and hyphens">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">WhatsApp Number <span class="text-slate-400 font-normal">(optional)</span></label>
            <input type="tel" id="whatsapp-number" placeholder="+1 234 567 8900"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
          </div>
          <button type="submit" id="setup-btn"
            class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
            <span>Create Store</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK - Commented out for localhost development -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script> -->

  <!-- App Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>

  <script>
    let pendingUserId = null;

    // Check if already logged in
    (async () => {
      await redirectIfAuth();
    })();

    // Initialize Lucide icons
    lucide.createIcons();

    // Switch between login/signup tabs
    function switchTab(tab) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        loginTab.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all bg-white text-brand-600 shadow-sm';
        signupTab.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-slate-500';
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        signupTab.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all bg-white text-brand-600 shadow-sm';
        loginTab.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-slate-500';
      }
    }

    // Handle login
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Logging in...</span>';

      const result = await login(email, password);

      if (result.success) {
        // Check if user has store info
        const storeResult = await getUserStoreInfo(result.user.uid);
        if (storeResult.success) {
          window.location.href = 'dashboard.html';
        } else {
          // Show store setup
          pendingUserId = result.user.uid;
          document.getElementById('store-setup-modal').classList.remove('hidden');
        }
      } else {
        showToast(result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span>Login</span>';
      }
    }

    // Handle signup
    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Creating account...</span>';

      const result = await signup(email, password);

      if (result.success) {
        pendingUserId = result.user.uid;
        document.getElementById('store-setup-modal').classList.remove('hidden');
        showToast('Account created! Set up your store.', 'success');
      } else {
        showToast(result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span>';
      }
    }

    // Update slug preview as user types store name
    function updateSlugPreview() {
      const name = document.getElementById('store-name').value;
      const slugInput = document.getElementById('store-slug');
      if (!slugInput.dataset.manual) {
        slugInput.value = generateSlug(name);
      }
    }

    // Mark slug as manually edited
    document.getElementById('store-slug').addEventListener('input', function() {
      this.dataset.manual = 'true';
    });

    // Handle store setup
    async function handleStoreSetup(e) {
      e.preventDefault();
      const btn = document.getElementById('setup-btn');
      const storeName = document.getElementById('store-name').value.trim();
      const storeSlug = document.getElementById('store-slug').value.trim().toLowerCase();
      const whatsappNumber = document.getElementById('whatsapp-number').value.trim();

      if (!storeSlug.match(/^[a-z0-9-]+$/)) {
        showToast('Store URL can only contain lowercase letters, numbers, and hyphens', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Creating store...</span>';

      const result = await saveStoreInfo(pendingUserId, storeName, storeSlug, whatsappNumber);

      if (result.success) {
        showToast('Store created successfully!', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);
      } else {
        showToast(result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Store</span>';
      }
    }

    // Prompt for store link
    function promptStoreLink() {
      const slug = prompt('Enter the store URL slug (e.g., "my-store"):');
      if (slug) {
        window.location.href = `store.html?shop=${slug.trim().toLowerCase()}`;
      }
    }
  </script>
</body>
</html>
