<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShop - Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50">
  <div id="toast-container" class="toast-container"></div>

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <button onclick="goBackToStore()" class="p-2 rounded-xl hover:bg-slate-100 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i>
      </button>
      <h1 class="font-bold text-slate-800 text-lg">Shopping Cart</h1>
      <span id="cart-count-label" class="text-sm text-slate-400">(0 items)</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <!-- Cart Items -->
    <div id="cart-items" class="space-y-3 mb-6">
      <!-- Cart items rendered here -->
    </div>

    <!-- Empty Cart -->
    <div id="empty-cart" class="hidden text-center py-16">
      <div class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i data-lucide="shopping-cart" class="w-10 h-10 text-slate-300"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-600 mb-2">Your cart is empty</h2>
      <p class="text-sm text-slate-400 mb-6">Browse the store and add some items!</p>
      <button id="back-to-store-btn" onclick="goBackToStore()"
        class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-6 rounded-xl text-sm transition-all">
        Continue Shopping
      </button>
    </div>

    <!-- Cart Summary -->
    <div id="cart-summary" class="hidden bg-white rounded-2xl border border-slate-200 p-6">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-600 font-medium">Subtotal</span>
        <span class="text-lg font-bold text-slate-800" id="cart-subtotal">$0.00</span>
      </div>
      <div class="flex gap-3">
        <button onclick="clearCartAndRefresh()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">
          Clear Cart
        </button>
        <button onclick="window.location.href='checkout.html'"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-brand-600 hover:bg-brand-700 text-white transition-all flex items-center justify-center gap-2">
          <i data-lucide="credit-card" class="w-4 h-4"></i>
          Checkout
        </button>
      </div>
    </div>
  </main>

  <!-- Firebase SDK - Commented out for localhost development -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script> -->

  <!-- App Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/cart.js"></script>

  <script>
    function initCart() {
      renderCart();
      lucide.createIcons();
    }

    function renderCart() {
      const cart = getCart();
      const itemsEl = document.getElementById('cart-items');
      const emptyEl = document.getElementById('empty-cart');
      const summaryEl = document.getElementById('cart-summary');
      const countLabel = document.getElementById('cart-count-label');

      if (cart.length === 0) {
        itemsEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        summaryEl.classList.add('hidden');
        countLabel.textContent = '(0 items)';
        return;
      }

      emptyEl.classList.add('hidden');
      summaryEl.classList.remove('hidden');

      let total = 0;
      let itemCount = 0;

      itemsEl.innerHTML = cart.map((item, index) => {
        total += item.price * item.quantity;
        itemCount += item.quantity;

        const imageUrl = item.media_urls && item.media_urls.length > 0 ? item.media_urls[0] : 'https://via.placeholder.com/80x80?text=No+Image';

        return `
          <div class="bg-white rounded-2xl border border-slate-200 p-4 flex gap-4">
            <img src="${imageUrl}" alt="${item.name}" class="w-20 h-20 rounded-xl object-cover flex-shrink-0">
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-slate-800 text-sm mb-1 truncate">${item.name}</h3>
              <div class="flex items-center justify-between">
                <span class="font-bold text-slate-800">$${item.price.toFixed(2)}</span>
                <div class="flex items-center gap-2">
                  <button onclick="updateQuantity(${index}, ${item.quantity - 1})"
                    class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center hover:bg-slate-50 disabled:opacity-50"
                    ${item.quantity <= 1 ? 'disabled' : ''}>
                    <i data-lucide="minus" class="w-4 h-4 text-slate-600"></i>
                  </button>
                  <span class="w-8 text-center text-sm font-medium text-slate-800">${item.quantity}</span>
                  <button onclick="updateQuantity(${index}, ${item.quantity + 1})"
                    class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center hover:bg-slate-50">
                    <i data-lucide="plus" class="w-4 h-4 text-slate-600"></i>
                  </button>
                </div>
              </div>
            </div>
            <button onclick="removeFromCart(${index})"
              class="p-2 rounded-xl hover:bg-red-50 text-red-500 flex-shrink-0">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        `;
      }).join('');

      countLabel.textContent = `(${itemCount} item${itemCount !== 1 ? 's' : ''})`;
      document.getElementById('cart-subtotal').textContent = `$${total.toFixed(2)}`;

      lucide.createIcons();
    }

    function updateQuantity(index, newQuantity) {
      if (newQuantity < 1) return;
      const cart = getCart();
      cart[index].quantity = newQuantity;
      saveCart(cart);
      renderCart();
    }

    function removeFromCart(index) {
      const cart = getCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    function clearCartAndRefresh() {
      clearCart();
      renderCart();
    }

    function goBackToStore() {
      window.location.href = 'store.html';
    }

    // Initialize on load
    window.onload = initCart;
      }
