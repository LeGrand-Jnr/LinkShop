<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check localStorage Data</title>
</head>
<body>
    <h1>LinkShop localStorage Data Check</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        // Check for existing products
        const products = JSON.parse(localStorage.getItem('linkshop_products') || '[]');
        output.innerHTML += `<h2>Products (${products.length})</h2>`;

        if (products.length === 0) {
            output.innerHTML += '<p>No products found in localStorage.</p>';
        } else {
            products.forEach((product, index) => {
                output.innerHTML += `
                    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                        <h3>Product ${index + 1}: ${product.name}</h3>
                        <p>ID: ${product.id}</p>
                        <p>Price: ${product.price}</p>
                        <p>Media URLs: ${product.media_urls ? product.media_urls.length : 0}</p>
                        ${product.media_urls ? product.media_urls.map(url => `
                            <div>
                                <p>URL: ${url.substring(0, 50)}...</p>
                                ${url.startsWith('data:') ? '<p style="color: green;">✓ Data URL (good)</p>' : '<p style="color: red;">✗ Mock URL (needs update)</p>'}
                            </div>
                        `).join('') : '<p>No media URLs</p>'}
                        ${product.media_url ? `
                            <div>
                                <p>Legacy media_url: ${product.media_url.substring(0, 50)}...</p>
                                ${product.media_url.startsWith('data:') ? '<p style="color: green;">✓ Data URL (good)</p>' : '<p style="color: red;">✗ Mock URL (needs update)</p>'}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        // Check for store info
        const storeInfo = JSON.parse(localStorage.getItem('linkshop_store') || 'null');
        if (storeInfo) {
            output.innerHTML += `<h2>Store Info</h2>`;
            output.innerHTML += `<p>Store Name: ${storeInfo.store_name}</p>`;
            output.innerHTML += `<p>Currency: ${storeInfo.currency}</p>`;
        }

        // Check for users
        const users = JSON.parse(localStorage.getItem('linkshop_users') || '[]');
        output.innerHTML += `<h2>Users (${users.length})</h2>`;
        users.forEach(user => {
            output.innerHTML += `<p>${user.email} (${user.role})</p>`;
        });
    </script>
</body>
